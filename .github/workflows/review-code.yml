name: GitHub Copilot AI Reviewer

# Trigger workflow on Issue or Pull Request comments,
# or manually via workflow_dispatch with parameters
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

  workflow_dispatch:
    inputs:
      review_mode:
        description: "full-review or partial-review"
        required: true
        default: "partial-review"
        type: choice
        options:
          - partial-review
          - full-review

jobs:
  copilot-agent:
    # Run if triggered manually or if comment contains /copilot command
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.comment.body, '/copilot')

    runs-on: [self-hosted]

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Determine Review Mode
        id: review_mode
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Default to partial-review (only review changed code / diff)
          MODE="partial-review"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MODE="${{ github.event.inputs.review_mode }}"
          else
            # Check if user requested full-review in the comment
            if [[ "$COMMENT_BODY" == *"full-review"* ]]; then
              MODE="full-review"
            fi
          fi

          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "Review mode set to: $MODE"

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 to get all commit history, necessary for
          # building knowledge graph or comparing diffs (partial-review)
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Knowledge Source Code (Graph Relation & Retrieval Context)
        id: build_knowledge
        run: |
          echo "Starting Build Knowledge Source Code with code-review-graph..."
          echo "Current mode: ${{ steps.review_mode.outputs.mode }}"

          # 1. Install code-review-graph
          pip install code-review-graph

          # 2. Build Knowledge Base Graph from source code
          code-review-graph build

          # 3. Extract Context
          if [[ "${{ steps.review_mode.outputs.mode }}" == "partial-review" ]]; then
            echo "=> Analyzing impact of changed code (Blast Radius)..."
            # Get actual diff combined with impact radius context
            git diff HEAD~1 HEAD > raw_diff.txt
            echo "=== RAW DIFF ===" > current_diff.txt
            cat raw_diff.txt >> current_diff.txt
            echo "=== CODE REVIEW GRAPH IMPACT ===" >> current_diff.txt
            code-review-graph detect-changes >> current_diff.txt || echo "No impact found" >> current_diff.txt
          else
            echo "=> Extracting overall architecture for the whole project..."
            code-review-graph status > full_context.txt
          fi

          echo "Finished building knowledge and retrieval context."

      - name: Pull & Load Agent Skills
        run: |
          echo "Setting up Agent Skills hub..."
          mkdir -p .agent-skills

          # Load internal skills from the repository
          echo "Loading internal skills..."
          if [ -d ".github/skills" ]; then
            cp -r .github/skills/* .agent-skills/
          else
            echo "No internal skills found at .github/skills."
          fi

          echo "=== Successfully Loaded Agent Skills ==="
          echo "Internal Skills:"
          ls -1 .agent-skills/internal/ 2>/dev/null | sed 's/^/- /' || echo "- None"
          echo "Public Skills:"
          ls -1 .agent-skills/public/ 2>/dev/null | sed 's/^/- /' || echo "- None"

      - name: Load Step Prompts
        run: |
          echo "Loading Step Prompts into runner workspace..."
          mkdir -p .agent-prompts

          if [ -d ".github/step_prompts" ]; then
            cp -r .github/step_prompts/* .agent-prompts/
            echo "=== Successfully Loaded Step Prompts ==="
            ls -1 .agent-prompts/ | sed 's/^/- /'
          else
            echo "ERROR: .github/step_prompts directory not found!"
            exit 1
          fi

      - name: Setup & Verify Agent Skills
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Install GitHub CLI (gh) dynamically if it's missing on the self-hosted runner
          if ! command -v gh &> /dev/null; then
            echo "gh CLI not found. Downloading..."
            curl -sL https://github.com/cli/cli/releases/download/v2.60.1/gh_2.60.1_linux_amd64.tar.gz | tar -xz
            mkdir -p $HOME/.local/bin
            cp gh_2.60.1_linux_amd64/bin/gh $HOME/.local/bin/
            echo "$HOME/.local/bin" >> $GITHUB_PATH
            export PATH="$HOME/.local/bin:$PATH"
          fi

          echo "Installing GitHub Copilot CLI extension..."
          gh extension install github/gh-copilot

          echo "Verifying available Agent Skills for Code Review (using Ollama + Copilot)..."
          echo "- Skill 1: AST Context Retrieval (code-review-graph) - [OK]"
          echo "- Loading Review Prompts from Hub - [OK]"
          echo "All necessary agent skills are loaded. Proceeding to review..."

          # Determine which context file to use based on REVIEW_MODE
          if [[ "${{ steps.review_mode.outputs.mode }}" == "partial-review" ]]; then
            echo "current_diff.txt" > context_file.txt
          else
            echo "full_context.txt" > context_file.txt
          fi

      - name: Review 1 - Coding Standards
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Starting Python ReAct Agent for Coding Standards..."
          python3 .github/scripts/react_agent.py --skill coding-standards --prompt-file .agent-prompts/coding-standards.txt

      - name: Review 2 - Security (SAST)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Starting Python ReAct Agent for Security..."
          python3 .github/scripts/react_agent.py --skill security --prompt-file .agent-prompts/security.txt

      - name: Review 3 - Code Smells
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Starting Python ReAct Agent for Clean Code..."
          python3 .github/scripts/react_agent.py --skill clean-code --prompt-file .agent-prompts/clean-code.txt

      - name: Review 4 - Performance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Starting Python ReAct Agent for Performance..."
          python3 .github/scripts/react_agent.py --skill performance --prompt-file .agent-prompts/performance.txt

      - name: Review 5 - Testability
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Starting Python ReAct Agent for Testability..."
          python3 .github/scripts/react_agent.py --skill testability --prompt-file .agent-prompts/testability.txt

      - name: Review 6 - Architecture
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Starting Python ReAct Agent for Architecture..."
          python3 .github/scripts/react_agent.py --skill architecture --prompt-file .agent-prompts/architecture.txt

      - name: Combine Review Reports
        run: |
          echo "=== AI CODE REVIEW REPORT ===" > final_review_report.md
          echo "## 1. Coding Standards & Conventions" >> final_review_report.md
          cat report_coding-standards.md >> final_review_report.md || echo "No report found." >> final_review_report.md
          echo -e "\n## 2. Security & Vulnerability" >> final_review_report.md
          cat report_security.md >> final_review_report.md || echo "No report found." >> final_review_report.md
          echo -e "\n## 3. Code Smells & Clean Code" >> final_review_report.md
          cat report_clean-code.md >> final_review_report.md || echo "No report found." >> final_review_report.md
          echo -e "\n## 4. Performance & Resource Optimization" >> final_review_report.md
          cat report_performance.md >> final_review_report.md || echo "No report found." >> final_review_report.md
          echo -e "\n## 5. Testability & Reliability" >> final_review_report.md
          cat report_testability.md >> final_review_report.md || echo "No report found." >> final_review_report.md
          echo -e "\n## 6. Architecture & Business Logic" >> final_review_report.md
          cat report_architecture.md >> final_review_report.md || echo "No report found." >> final_review_report.md

          echo "Final report generated:"
          cat final_review_report.md
