name: GitHub Copilot AI Reviewer

# Trigger workflow on Issue or Pull Request comments,
# or manually via workflow_dispatch with parameters
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

  workflow_dispatch:
    inputs:
      review_mode:
        description: "full-review or partial-review"
        required: true
        default: "partial-review"
        type: choice
        options:
          - partial-review
          - full-review

jobs:
  copilot-agent:
    # Run if triggered manually or if comment contains /copilot command
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.comment.body, '/copilot')

    runs-on: [self-hosted]

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Determine Review Mode
        id: review_mode
        run: |
          # Default to partial-review (only review changed code / diff)
          MODE="partial-review"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MODE="${{ github.event.inputs.review_mode }}"
          else
            # Check if user requested full-review in the comment (e.g., /copilot full-review)
            COMMENT="${{ github.event.comment.body }}"
            if [[ "$COMMENT" == *"full-review"* ]]; then
              MODE="full-review"
            fi
          fi

          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "Review mode set to: $MODE"

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 to get all commit history, necessary for
          # building knowledge graph or comparing diffs (partial-review)
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Knowledge Source Code (Graph Relation & Retrieval Context)
        id: build_knowledge
        run: |
          echo "Starting Build Knowledge Source Code with code-review-graph..."
          echo "Current mode: ${{ steps.review_mode.outputs.mode }}"

          # 1. Install code-review-graph
          pip install code-review-graph

          # 2. Build Knowledge Base Graph from source code
          code-review-graph build

          # 3. Extract Context
          if [[ "${{ steps.review_mode.outputs.mode }}" == "partial-review" ]]; then
            echo "=> Analyzing impact of changed code (Blast Radius)..."
            # Get actual diff combined with impact radius context
            git diff HEAD~1 HEAD > raw_diff.txt
            echo "=== RAW DIFF ===" > current_diff.txt
            cat raw_diff.txt >> current_diff.txt
            echo "=== CODE REVIEW GRAPH IMPACT ===" >> current_diff.txt
            code-review-graph detect-changes >> current_diff.txt || echo "No impact found" >> current_diff.txt
          else
            echo "=> Extracting overall architecture for the whole project..."
            code-review-graph status > full_context.txt
          fi

          echo "Finished building knowledge and retrieval context."

      - name: Pull & Load Agent Skills
        run: |
          echo "Setting up Agent Skills hub..."
          mkdir -p .agent-skills/internal
          mkdir -p .agent-skills/public
          
          # Load public skills (Example)
          echo "Cloning public skills from GitHub..."
          git clone https://github.com/ertugrul-dmr/clean-code-skills.git .agent-skills/public/clean-code-skills || echo "Note: Failed to clone public repo, skipping."
          
          # Load internal skills from the repository
          echo "Loading internal skills..."
          if [ -d ".github/skills" ]; then
            cp -r .github/skills/* .agent-skills/internal/
          else
            echo "No internal skills found at .github/skills."
          fi
          
          echo "=== Successfully Loaded Agent Skills ==="
          echo "Internal Skills:"
          ls -1 .agent-skills/internal/ 2>/dev/null | sed 's/^/- /' || echo "- None"
          echo "Public Skills:"
          ls -1 .agent-skills/public/ 2>/dev/null | sed 's/^/- /' || echo "- None"

      - name: Setup & Verify Agent Skills
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Install GitHub CLI (gh) dynamically if it's missing on the self-hosted runner
          if ! command -v gh &> /dev/null; then
            echo "gh CLI not found. Downloading..."
            curl -sL https://github.com/cli/cli/releases/download/v2.60.1/gh_2.60.1_linux_amd64.tar.gz | tar -xz
            mkdir -p $HOME/.local/bin
            cp gh_2.60.1_linux_amd64/bin/gh $HOME/.local/bin/
            echo "$HOME/.local/bin" >> $GITHUB_PATH
            export PATH="$HOME/.local/bin:$PATH"
          fi

          echo "Installing GitHub Copilot CLI extension..."
          gh extension install github/gh-copilot

          echo "Verifying available Agent Skills for Code Review (using Ollama + Copilot)..."
          echo "- Skill 1: AST Context Retrieval (code-review-graph) - [OK]"
          echo "- Loading Review Prompts from Hub - [OK]"
          echo "All necessary agent skills are loaded. Proceeding to review..."

          # Determine which context file to use based on REVIEW_MODE
          if [[ "${{ steps.review_mode.outputs.mode }}" == "partial-review" ]]; then
            echo "current_diff.txt" > context_file.txt
          else
            echo "full_context.txt" > context_file.txt
          fi

      - name: Build General Skills Catalog
        run: |
          cat << 'EOF' > build_catalog.py
          import os
          import re
          
          catalog = []
          for root, dirs, files in os.walk('.agent-skills'):
              if 'SKILL.md' in files:
                  filepath = os.path.join(root, 'SKILL.md')
                  with open(filepath, 'r') as f:
                      content = f.read()
                      if content.startswith('---'):
                          parts = content.split('---', 2)
                          if len(parts) >= 3:
                              fm = parts[1]
                              name_match = re.search(r'^name:\s*(.+)$', fm, re.MULTILINE)
                              desc_match = re.search(r'^description:\s*(.+)$', fm, re.MULTILINE)
                              if name_match and desc_match:
                                  name = name_match.group(1).strip()
                                  desc = desc_match.group(1).strip()
                                  catalog.append(f"- Skill Name: {name}\n  Description: {desc}\n  Path: {filepath}")
          
          with open('GENERAL_SKILLS_CATALOG.txt', 'w') as f:
              f.write("\n\n".join(catalog))
          EOF
          python3 build_catalog.py
          echo "Generated GENERAL_SKILLS_CATALOG.txt:"
          cat GENERAL_SKILLS_CATALOG.txt

      - name: Agentic Router (Select Skills)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat << 'EOF' > router_prompt.txt
          You are an AI Orchestrator. Your task is to select the most relevant code review skills from the catalog to analyze the following code.
          
          === SKILLS CATALOG ===
          EOF
          cat GENERAL_SKILLS_CATALOG.txt >> router_prompt.txt
          cat << 'EOF' >> router_prompt.txt
          
          Based on the code changes below, which skills are necessary to review this code?
          Respond ONLY with a comma-separated list of the "Skill Name"s you have chosen (e.g. coding-standards, security-sast).
          Do not include any other text, reasoning, or markdown formatting.
          If no skills are relevant, respond with "NONE".
          EOF
          
          CONTEXT=$(cat context_file.txt)
          echo "=> Asking Orchestrator LLM to select skills..."
          ollama launch copilot --model glm-5.2:cloud -- "$(cat router_prompt.txt) \n\n === CODE === \n\n $(cat $CONTEXT)" > chosen_skills_raw.txt
          
          # Clean output
          cat chosen_skills_raw.txt | sed 's/`//g' > chosen_skills.txt
          echo "=> Chosen Skills:"
          cat chosen_skills.txt

      - name: Execution Loop (Run Selected Skills)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== AI CODE REVIEW REPORT ===" > final_review_report.md
          
          CHOSEN=$(cat chosen_skills.txt)
          if [[ "$CHOSEN" == *"NONE"* || -z "$CHOSEN" ]]; then
            echo "No relevant skills selected. Skipping review."
            echo "No relevant skills selected by the router. Skipping review." >> final_review_report.md
            exit 0
          fi
          
          IFS=',' read -ra SKILL_ARRAY <<< "$CHOSEN"
          CONTEXT=$(cat context_file.txt)
          
          for SKILL_NAME in "${SKILL_ARRAY[@]}"; do
            # Trim whitespace
            SKILL_NAME=$(echo "$SKILL_NAME" | xargs)
            if [ -z "$SKILL_NAME" ]; then continue; fi
            
            echo "=> Executing Skill: $SKILL_NAME"
            
            # Find path in catalog
            SKILL_PATH=$(grep -A 2 "- Skill Name: $SKILL_NAME" GENERAL_SKILLS_CATALOG.txt | grep "Path:" | sed 's/.*Path: //' || true)
            
            if [ -n "$SKILL_PATH" ] && [ -f "$SKILL_PATH" ]; then
              echo "## Skill Review: $SKILL_NAME" >> final_review_report.md
              echo "Running $SKILL_PATH..."
              ollama launch copilot --model glm-5.2:cloud -- "$(cat $SKILL_PATH) \n\n === CODE === \n\n $(cat $CONTEXT)" > "report_${SKILL_NAME}.md"
              cat "report_${SKILL_NAME}.md" >> final_review_report.md
              echo -e "\n\n" >> final_review_report.md
            else
              echo "Warning: Could not find SKILL.md for $SKILL_NAME"
            fi
          done
          
          echo "Final report generated:"
          cat final_review_report.md
